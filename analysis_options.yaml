include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    missing_required_param: error
    missing_return: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # ── Stylistic rules disabled for this project ────────────────────────────
    # Public API docs not required in an app.
    public_member_api_docs: false
    # Spanish UI strings use both quote types — don't enforce single quotes.
    prefer_single_quotes: false
    # Widget trees have long lines; 80-char limit is impractical.
    lines_longer_than_80_chars: false
    # Relative imports are fine within this package.
    always_use_package_imports: false
    # Constructor ordering is a preference, not correctness.
    sort_constructors_first: false
    # Required-param ordering is a preference.
    always_put_required_named_parameters_first: false
    # Explicit local types improve readability in widget trees.
    omit_local_variable_types: false
    # 16.0 vs 16 is stylistic.
    prefer_int_literals: false
    # Redundant default args are often left in for explicitness.
    avoid_redundant_argument_values: false
    # Import section ordering is a preference.
    directives_ordering: false
    # pubspec dep sorting is optional.
    sort_pub_dependencies: false
